<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <title>Assignment 12-1 Demo</title>
  <script src="bankAccount.js"></script>
</head>
<body>
  <script>
    const bankAccount = new BankAccount(1000.00);
    bankAccount.accountNumber = "1-12345";

    console.log("Account Balance", bankAccount.balance());

    bankAccount.deposit(20);

    console.log("Account Balance After Deposit", bankAccount.balance());
    console.log(bankAccount.accountTransactions);

    bankAccount.withdraw(10);

    console.log("Account Balance After Withdraw", bankAccount.balance());
    console.log(bankAccount.accountTransactions);

  </script>
</body>
