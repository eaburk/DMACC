<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Box Model Demo</title>
  <style>
    * {
      margin: 0;
      padding: 0;
    }

    body {
      background-color: lightblue;
    }

    .container {
      background-color: white;
      border: 1px solid;
      width: 80%;
      padding: 15px;
      margin: 0 auto;
    }

    .left {
      border: 1px solid;
      float: left;
    }

    .right {
      border: 1px solid;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="left">
      Left Content
    </div>
    <div class="right">
      Right Content
    </div>
  </div>
</body>
</html>
